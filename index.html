<!DOCTYPE html>
<html>
<head>
<title>Student Attendance System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:380px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#0f172a;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.btn{
    width:100%;
    padding:12px;
    background:#001f54;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

#errorMsg{
    color:red;
    margin-top:10px;
    font-size:14px;
    font-weight:bold;
}

.btn:hover{
    background:#003080;
}
</style>

</head>

<body>

<div class="login-box">

<h1>Student Attendance System</h1>
<p>Login to continue</p>

<form onsubmit="event.preventDefault(); login();">

<div class="input-group">
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<div id="errorMsg"></div>

<button class="btn" type="submit">LOGIN</button>

</form>

</div>

<script>
function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status == "success"){

    localStorage.setItem("username", data.username);

    window.location.href = "dashboard.html";
}
else{

    document.getElementById("errorMsg").innerHTML =
    "Invalid Username or Password";

}
    })
    .catch(err => {
        alert("Server Error");
        console.log(err);
    });
}
</script>

</body>
</html>
