<script>

function formatDateTime(dateStr, timeStr){

    let date = new Date(dateStr);

    let day = String(date.getDate()).padStart(2,'0');
    let month = String(date.getMonth()+1).padStart(2,'0');
    let year = date.getFullYear();

    let formattedDate =
    `${day}/${month}/${year}`;

    let [h,m,s] = timeStr.split(":");

    let hour = parseInt(h);

    let ampm =
    hour >= 12 ? "PM" : "AM";

    hour = hour % 12;

    if(hour === 0){
        hour = 12;
    }

    let formattedTime =
    `${String(hour).padStart(2,'0')}:${m}:${s} ${ampm}`;

    return {
        date: formattedDate,
        time: formattedTime
    };
}

function loadHistory(){

    fetch("http://localhost:3000/attendance")

    .then(res => res.json())

    .then(data => {

        let tbody =
        document.getElementById("historyBody");

        tbody.innerHTML = "";

        let sno = 1;

        data.forEach(row => {

            let result =
            formatDateTime(
                row.attendance_date,
                row.attendance_time
            );

            tbody.innerHTML += `
            <tr>
                <td>${sno++}</td>
                <td>${row.username}</td>
                <td>${result.date}</td>
                <td>${result.time}</td>
                <td class="present">Present</td>
            </tr>
            `;
        });

    })

    .catch(err => {
        console.log(err);
        alert("Failed to load attendance history");
    });

}

loadHistory();

</script>
