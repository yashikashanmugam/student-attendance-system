<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
}

/* Navbar */
.navbar{
    background:#001f54;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.logout-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.logout-btn:hover{
    background:#b91c1c;
}

/* Container */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.title{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:35px;
}

/* Menu */
.menu{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.menu button{
    width:250px;
    height:100px;
    border:none;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    background:#001f54;
    color:white;
    transition:0.3s;
}

.menu button:hover{
    transform:translateY(-5px);
    background:#00308f;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Student Attendance System</div>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>
</div>

<div class="container">

    <h1 class="title">Dashboard</h1>

    <div class="menu">
        <button onclick="window.location.href='attendance.html'">
            Mark Attendance
        </button>

        <button onclick="window.location.href='attendance-history.html'">
            Attendance History
        </button>
    </div>

</div>
<body>

    <!-- Dashboard Content -->

    <button onclick="resetAttendance()">
        Start New Session
    </button>

    <script>

    function resetAttendance(){

        fetch("http://localhost:3000/reset-attendance",{
            method:"DELETE"
        })
        .then(res => res.json())
        .then(data => {

            if(data.success){
                alert("Attendance Cleared Successfully");
            }else{
                alert("Failed");
            }

        });

    }

    </script>

</body>
</html>
<script>
function logout() {
    // clear saved login/session data
    localStorage.clear();

    // redirect to login page
    window.location.href = "login.html";
}
</script>

</body>
</html>
